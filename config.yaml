# 配置文件：所有参数配置化

# ETF标的池
etf_pool:
  - "510300"  # 沪深300ETF
  - "510500"  # 中证500ETF
  - "159915"  # 创业板ETF
  - "159919"  # 沪深300ETF
  - "512100"  # 医药ETF
  - "512880"  # 证券ETF
  - "515050"  # 5GETF
  - "516160"  # 新能源ETF
  - "159949"  # 恒生ETF
  - "518880"  # 黄金ETF
  - "159952"  # 创业板ETF
  - "159926"  # 国债ETF
  - "159941"  # 纳斯达克ETF

# 聚类参数
clustering:
  lookback_days: 120  # 历史收益率天数

# 因子参数
factors:
  momentum:
    ret20_weight: 0.6
    ret60_weight: 0.4
  trend:
    ma20_period: 20
    ma60_period: 60
  final_score:
    momentum_weight: 0.7
    trend_weight: 0.3

# ETF选择
selection:
  top_n: 3  # 选择前3个

# 风险控制
risk:
  market_filter:
    index: "000300"  # 沪深300指数
    ma_period: 60
  downside_vol: true  # 使用下行波动
  risk_budget: true
  vol_target: 0.10  # 年化波动率目标10%
  drawdown_limit: -0.05  # 回撤控制-5%
  stop_loss: -0.08  # 单标止损-8%

# 交易参数
trading:
  rebalance_freq: 1  # 每周调仓次数
  min_shares: 1  # 最小交易单位（回测阶段设为1，实盘改为100）
  twap_splits: 5  # TWAP拆单次数
  twap_interval: 3  # 间隔秒数

# 回测参数
backtest:
  start_date: "2020-01-01"
  end_date: "2021-12-31"
  initial_cash: 1000000.0  # 初始资金100万元
  fee_rate: 0.0001  # 手续费万2
  slippage: 0.001  # 滑点0.1%

# 数据源
data:
  source: "xtquant"  # akshare, xtquant, mock
  # Mock数据生成参数
  mock:
    base_price_min: 1.0      # 基础价格最小值
    base_price_max: 5.0      # 基础价格最大值
    daily_return_mean: 0.0005  # 日收益率均值（0.05%）
    daily_return_std: 0.02     # 日收益率标准差（2%）
    high_low_range: 0.01       # 最高最低价波动范围（1%）
    open_close_range: 0.005    # 开盘价波动范围（0.5%）
    volume_min: 100000         # 最小成交量
    volume_max: 10000000       # 最大成交量
    random_seed: 42            # 随机种子（保证可重复性）

# 实盘参数
live:
  rebalance_time: "14:55"
  check_interval: 300  # 风控检查间隔秒数